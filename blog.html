<!DOCTYPE html>
<html lang="pl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <link rel="stylesheet" href="style.css">

    <title>Blog – Przewodnik Higieny</title>
    
</head>
<body>

<div id="menu-placeholder"></div>

<script>
    fetch("menu.html")
        .then(response => response.text())
        .then(data => {
            document.getElementById("menu-placeholder").innerHTML = data;
        });
</script>



<div class="header">
    <h1>Blog</h1>
    <p>Aktualności, wskazówki i praktyczne porady dotyczące higieny w kuchniach profesjonalnych</p>
</div>

<div class="content">

    <div class="post">
        <h3>Pierwszy wpis na blogu</h3>
        <p>Tu możesz dodać swoje pierwsze wpisy — aktualności, ciekawostki, porady dla kucharzy i managerów.</p>
    </div>

</div>

<div id="footer-placeholder"></div>

<script>
    fetch("footer.html")
        .then(response => response.text())
        .then(data => {
            document.getElementById("footer-placeholder").innerHTML = data;
        });
</script>

</body>
</html>
